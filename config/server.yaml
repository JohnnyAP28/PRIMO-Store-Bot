messages:
  - key: boas_vindas
    channel: entrou
    title: "Bem-vindo à PRIMO Store"
    body: |
      Bem-vindo à PRIMO Store. Use os canais abaixo para ler regras, ver avisos, tirar dúvidas e acompanhar serviços digitais permitidos.
    fields:
      - name: Comece aqui
        value: Leia termos, regras e como funciona o atendimento antes de negociar.

  - key: termos
    channel: termos
    title: "Termos de uso"
    body: |
      A PRIMO Store organiza atendimento e divulgação de serviços digitais permitidos.
      Não compartilhe senhas, tokens, dados pessoais ou acessos sensíveis.
      Negociações devem respeitar leis aplicáveis, regras dos provedores e regras do Discord.

  - key: regras
    channel: regras
    title: "Regras"
    body: |
      1. Sem phishing, spam, malware, golpes ou abuso.
      2. Sem venda de contas Discord, tokens, convites customizados, boosts ou benefícios irregulares.
      3. Sem clonagem, bypass, cheats, spoofers ou ferramentas de trapaça.
      4. Serviços anunciados precisam ser legítimos, autorizados e claros.
      5. A staff pode remover anúncios e membros que coloquem o servidor em risco.

  - key: avisos
    channel: avisos
    title: "Avisos oficiais"
    body: |
      Este canal será usado para comunicados, mudanças no catálogo, promoções permitidas e atualizações importantes.

  - key: ticket
    channel: ticket
    title: "Atendimento"
    body: |
      Envie sua dúvida neste canal ou chame a staff conforme orientação do servidor.
      O ticket automático ainda não está ativo; por enquanto o atendimento é manual.

  - key: feedback
    channel: feedback
    title: "Feedback"
    body: |
      Depois do atendimento, deixe seu feedback com clareza e respeito.

